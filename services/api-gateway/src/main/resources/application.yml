server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth

          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**,/api/users/**,/api/roles/**,/api/me/**,/api/permissions
          filters:
            - RewritePath=/api/(?<seg>.*), /$\{seg}
        - id: feedback
          uri: ${FEEDBACK_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/interactions/**
          filters:
            - RewritePath=/api/(?<seg>.*), /$\{seg}
        - id: validation
          uri: ${VALIDATION_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/commitments/**,/api/validations/**,/api/analytics/**
          filters:
            - RewritePath=/api/(?<seg>.*), /$\{seg}
        - id: escalation
          uri: ${ESCALATION_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/escalations/**
          filters:
            - RewritePath=/api/(?<seg>.*), /$\{seg}

insightloop:
  jwt:
    secret: ${JWT_SECRET:change_me_to_a_long_random_string_at_least_32_bytes_long_please}
