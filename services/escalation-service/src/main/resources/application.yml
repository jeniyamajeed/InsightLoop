server:
  port: 8084
spring:
  application:
    name: escalation-service
  datasource:
    url: jdbc:mysql://localhost:3306/escalation_db
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate: { ddl-auto: validate }
    properties: { hibernate.dialect: org.hibernate.dialect.MySQLDialect }
    open-in-view: false
  flyway: { enabled: true, baseline-on-migrate: true, clean-on-validation-error: true, clean-disabled: false }
insightloop:
  jwt:
    secret: ${JWT_SECRET:change_me_to_a_long_random_string_at_least_32_bytes_long_please}
